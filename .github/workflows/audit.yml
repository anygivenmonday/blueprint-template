# a no-op and reports green on the daily schedule — useful as a
# "the repo is healthy and visible" signal to the meta-site.
#
# Scope (when implemented):
#  - Dependency vulnerability scan (pip-audit / npm audit / cargo audit)
#  - Static analysis where free + meaningful (ruff, eslint, clippy)
#  - Secret scanning (gitleaks)
#
# Dependabot / Renovate handle dep-update PRs separately — this
# workflow only REPORTS findings, it doesn't open PRs.

name: Audit

